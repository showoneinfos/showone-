<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShowOne — Messagerie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --purple:#5B4FE8; --purple-dark:#3D32C4; --purple-deep:#1a1535; --red:#E8394F; --cream:#f5f3ff; --muted:#a09dc0; --border:rgba(91,79,232,0.13); --white:#fff; --sidebar-w:240px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--purple-deep); display:flex; min-height:100vh; }
  .sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--purple-deep); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:50; }
  .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .sidebar-logo a { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:#fff; text-decoration:none; }
  .sidebar-logo a span { color:var(--red); }
  .sidebar-logo p { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
  .sidebar-avatar { padding:16px 24px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .avatar-circle { width:40px; height:40px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; flex-shrink:0; overflow:hidden; }
  .avatar-name { font-size:13px; font-weight:600; color:#fff; }
  .avatar-role { font-size:11px; color:rgba(255,255,255,0.4); }
  .sidebar-nav { padding:16px 12px; flex:1; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:9px; cursor:pointer; color:rgba(255,255,255,0.55); font-size:13px; font-weight:500; text-decoration:none; transition:all .2s; margin-bottom:2px; }
  .nav-item:hover { background:rgba(255,255,255,0.07); color:#fff; }
  .nav-item.active { background:rgba(91,79,232,0.35); color:#fff; }
  .sidebar-bottom { padding:16px 12px; border-top:1px solid rgba(255,255,255,0.06); }
  .nav-danger { color:rgba(232,57,79,0.7); }
  .nav-danger:hover { background:rgba(232,57,79,0.1); color:var(--red); }
  .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  .topbar { padding:20px 28px; border-bottom:1px solid var(--border); background:var(--white); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .topbar h1 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
  .topbar p { font-size:13px; color:var(--muted); margin-top:2px; }
  .btn-new { padding:9px 16px; border-radius:9px; border:none; background:var(--purple); color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; display:none; }
  .msg-layout { display:flex; flex:1; overflow:hidden; }
  .conv-list { width:320px; border-right:1px solid var(--border); background:var(--white); display:flex; flex-direction:column; flex-shrink:0; }
  .conv-search { padding:14px 16px; border-bottom:1px solid var(--border); }
  .conv-search input { width:100%; padding:9px 14px; border:1.5px solid var(--border); border-radius:9px; background:var(--cream); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; color:var(--purple-deep); }
  .conv-items { flex:1; overflow-y:auto; }
  .conv-item { display:flex; gap:12px; align-items:flex-start; padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .2s; }
  .conv-item:hover { background:var(--cream); }
  .conv-item.active { background:rgba(91,79,232,0.06); border-left:3px solid var(--purple); }
  .conv-avatar { width:44px; height:44px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; flex-shrink:0; overflow:hidden; }
  .conv-avatar img { width:100%; height:100%; object-fit:cover; }
  .conv-info { flex:1; min-width:0; }
  .conv-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .conv-name { font-size:14px; font-weight:600; }
  .conv-time { font-size:11px; color:var(--muted); }
  .conv-preview { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-dot { width:8px; height:8px; border-radius:50%; background:var(--purple); flex-shrink:0; margin-top:6px; }
  .conv-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:13px; }
  .conv-view { flex:1; display:flex; flex-direction:column; background:var(--cream); }
  .conv-header { padding:16px 24px; background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .conv-header-av { width:44px; height:44px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; overflow:hidden; flex-shrink:0; }
  .conv-header-av img { width:100%; height:100%; object-fit:cover; }
  .conv-header-info h3 { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
  .conv-header-info p { font-size:12px; color:var(--muted); }
  .messages-area { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
  .msg-wrap { display:flex; gap:10px; align-items:flex-end; }
  .msg-wrap.sent { flex-direction:row-reverse; }
  .msg-av { width:32px; height:32px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700; flex-shrink:0; }
  .msg-bubble { max-width:65%; padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.55; }
  .msg-bubble.recv { background:var(--white); border:1.5px solid var(--border); border-bottom-left-radius:4px; }
  .msg-bubble.sent { background:var(--purple); color:#fff; border-bottom-right-radius:4px; }
  .msg-objet { font-size:11px; font-weight:700; opacity:.7; margin-bottom:4px; }
  .msg-time { font-size:10px; opacity:.6; margin-top:6px; text-align:right; }
  .msg-date { text-align:center; font-size:11px; color:var(--muted); font-weight:600; padding:4px 0; }
  .placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:12px; }
  .reply-area { padding:16px 24px; background:var(--white); border-top:1px solid var(--border); flex-shrink:0; }
  .reply-wrap { display:flex; gap:10px; align-items:flex-end; }
  .reply-ta { flex:1; padding:12px 16px; border:1.5px solid var(--border); border-radius:12px; background:var(--cream); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; resize:none; min-height:44px; max-height:120px; line-height:1.5; color:var(--purple-deep); }
  .reply-ta:focus { border-color:var(--purple); background:#fff; }
  .btn-send-reply { width:44px; height:44px; border-radius:12px; border:none; background:var(--purple); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .btn-send-reply:disabled { opacity:.4; cursor:not-allowed; }
  .modal-ov { position:fixed; inset:0; background:rgba(26,21,53,0.6); z-index:300; display:none; align-items:center; justify-content:center; }
  .modal-ov.open { display:flex; }
  .modal { background:#fff; border-radius:18px; padding:28px; width:100%; max-width:500px; margin:20px; }
  .modal h2 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:20px; }
  .fg { margin-bottom:14px; }
  .flabel { display:block; font-size:12px; font-weight:700; margin-bottom:6px; }
  .finput, .fselect, .ftextarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; background:#fff; font-size:14px; color:var(--purple-deep); font-family:'DM Sans',sans-serif; outline:none; }
  .ftextarea { resize:vertical; min-height:100px; line-height:1.6; }
  .btn-envoyer { width:100%; padding:13px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:6px; }
  .modal-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .btn-fermer { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><a href="/">Show<span>One</span></a><p id="sideRole2">Espace Talent</p></div>
  <div class="sidebar-avatar">
    <div class="avatar-circle" id="sideAv">?</div>
    <div><div class="avatar-name" id="sideNom">…</div><div class="avatar-role" id="sideRole">—</div></div>
  </div>
  <nav class="sidebar-nav" id="sideNav"></nav>
  <div class="sidebar-bottom"><a href="#" onclick="deconnecter()" class="nav-item nav-danger">🚪 Se déconnecter</a></div>
</div>

<div class="main">
  <div class="topbar">
    <div><h1>💬 Messagerie</h1><p>Vos conversations</p></div>
    <button class="btn-new" id="btnNew" onclick="ouvrirModal()">✉️ Nouveau message</button>
  </div>
  <div class="msg-layout">
    <div class="conv-list">
      <div class="conv-search"><input type="text" placeholder="🔍 Rechercher…" oninput="filtrer(this.value)"></div>
      <div class="conv-items" id="convItems"><div class="conv-empty">Chargement…</div></div>
    </div>
    <div class="conv-view">
      <div class="placeholder" id="placeholder"><div style="font-size:48px;opacity:.3">💬</div><p>Sélectionnez une conversation</p></div>
      <div id="convActive" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div class="conv-header">
          <div class="conv-header-av" id="hAv">?</div>
          <div class="conv-header-info"><h3 id="hNom">—</h3><p id="hSub">—</p></div>
        </div>
        <div class="messages-area" id="msgArea"></div>
        <div class="reply-area">
          <div class="reply-wrap">
            <textarea class="reply-ta" id="replyTa" placeholder="Écrire une réponse… (Entrée pour envoyer)" rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyer()}"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
            <button class="btn-send-reply" id="btnReply" onclick="envoyer()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div class="modal-actions"><h2>Nouveau message</h2><button class="btn-fermer" onclick="fermerModal()">✕</button></div>
    <div class="fg"><label class="flabel">Talent</label><select class="fselect" id="selTalent"><option value="">Choisir…</option></select></div>
    <div class="fg"><label class="flabel">Objet</label><input class="finput" type="text" id="newObjet" placeholder="Proposition de casting"></div>
    <div class="fg"><label class="flabel">Message</label><textarea class="ftextarea" id="newContenu" placeholder="Bonjour…"></textarea></div>
    <button class="btn-envoyer" onclick="envoyerNouveauMsg()">Envoyer ✓</button>
  </div>
</div>

<script>
const SB = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';

let role = null, profilId = null, token = null, convs = [], convActive = null;

async function get(url) {
  const r = await fetch(SB + url, { headers: { apikey: KEY, Authorization: 'Bearer ' + token } });
  const d = await r.json();
  return Array.isArray(d) ? d : [];
}

async function post(url, body) {
  return fetch(SB + url, { method: 'POST', headers: { 'Content-Type': 'application/json', apikey: KEY, Authorization: 'Bearer ' + token, Prefer: 'return=minimal' }, body: JSON.stringify(body) });
}

async function init() {
  token = localStorage.getItem('showone_token');
  const us = localStorage.getItem('showone_user');
  if (!token || !us) { location.href = '/connexion'; return; }
  const u = JSON.parse(us);
  role = u.type_compte || 'talent';

  document.getElementById('sideNom').textContent = ((u.prenom||'') + ' ' + (u.nom||'')).trim() || u.email;
  document.getElementById('sideRole').textContent = role === 'recruteur' ? 'Recruteur' : 'Talent';
  document.getElementById('sideRole2').textContent = role === 'recruteur' ? 'Espace Recruteur' : 'Espace Talent';
  if (u.photo_url) document.getElementById('sideAv').innerHTML = `<img src="${u.photo_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`;
  else document.getElementById('sideAv').textContent = ((u.prenom?.[0]||'')+(u.nom?.[0]||'')).toUpperCase()||'?';

  const nav = document.getElementById('sideNav');
  if (role === 'recruteur') {
    nav.innerHTML = `<a href="/dashboard-recruteur" class="nav-item">🏠 Tableau de bord</a><a href="/messagerie" class="nav-item active">💬 Messagerie</a><a href="/categories" class="nav-item">🔍 Talents</a>`;
    document.getElementById('btnNew').style.display = 'block';
  } else {
    nav.innerHTML = `<a href="/dashboard-talent" class="nav-item">🏠 Tableau de bord</a><a href="/messagerie" class="nav-item active">💬 Messagerie</a><a href="/categories" class="nav-item">🎬 Explorer</a>`;
  }

  // Récupérer profilId
  if (role === 'recruteur') {
    const d = await get(`/rest/v1/profils_recruteurs?utilisateur_id=eq.${u.id}&select=id&limit=1`);
    profilId = d[0]?.id;
  } else {
    const d = await get(`/rest/v1/profils_talents?utilisateur_id=eq.${u.id}&select=id&limit=1`);
    profilId = d[0]?.id;
  }

  await charger();

  const p = new URLSearchParams(location.search);
  if (p.get('talent_id') && role === 'recruteur') ouvrirModal(p.get('talent_id'));
}

async function charger() {
  const el = document.getElementById('convItems');
  el.innerHTML = '<div class="conv-empty">Chargement…</div>';
  if (!profilId) { el.innerHTML = '<div class="conv-empty">Profil introuvable.</div>'; return; }

  const filtre = role === 'talent' ? `talent_id=eq.${profilId}` : `recruteur_id=eq.${profilId}`;
  const msgs = await get(`/rest/v1/messages?${filtre}&select=id,recruteur_id,talent_id,objet,contenu,lu,created_at&order=created_at.desc`);

  if (!msgs.length) { el.innerHTML = '<div class="conv-empty">Aucune conversation.</div>'; return; }

  // Grouper
  const map = {};
  msgs.forEach(m => {
    if (!m.recruteur_id || !m.talent_id) return;
    const k = m.recruteur_id + '__' + m.talent_id;
    if (!map[k]) map[k] = { k, rId: m.recruteur_id, tId: m.talent_id, last: m, unread: 0, nom: '…', photo: null };
    if (new Date(m.created_at) > new Date(map[k].last.created_at)) map[k].last = m;
    if (!m.lu && role === 'talent') map[k].unread++;
  });
  convs = Object.values(map).sort((a,b) => new Date(b.last.created_at) - new Date(a.last.created_at));

  afficher(convs);

  // Enrichir les noms
  for (const c of convs) {
    const autreId = role === 'talent' ? c.rId : c.tId;
    const table = role === 'talent' ? 'profils_recruteurs' : 'profils_talents';
    const champs = role === 'talent' ? 'id,nom_entreprise,photo_url,utilisateur_id' : 'id,nom_scene,photo_url,utilisateur_id';
    const d = await get(`/rest/v1/${table}?id=eq.${autreId}&select=${champs}&limit=1`);
    if (d.length) {
      c.photo = d[0].photo_url;
      if (role === 'talent') {
        c.nom = d[0].nom_entreprise || 'Recruteur';
        if (!d[0].nom_entreprise && d[0].utilisateur_id) {
          const u2 = await get(`/rest/v1/utilisateurs?id=eq.${d[0].utilisateur_id}&select=prenom,nom&limit=1`);
          if (u2.length) c.nom = ((u2[0].prenom||'')+' '+(u2[0].nom||'')).trim() || 'Recruteur';
        }
      } else {
        c.nom = d[0].nom_scene || 'Talent';
      }
    }
    afficher(convs);
  }
}

function afficher(liste) {
  const el = document.getElementById('convItems');
  if (!liste.length) { el.innerHTML = '<div class="conv-empty">Aucune conversation.</div>'; return; }
  el.innerHTML = liste.map(c => {
    const ini = (c.nom[0]||'?').toUpperCase();
    const d = new Date(c.last.created_at);
    const dh = Math.round((Date.now()-d)/36e5);
    const t = dh<1?'À l\'instant':dh<24?dh+'h':dh<48?'Hier':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    return `<div class="conv-item ${convActive===c.k?'active':''}" data-k="${c.k}" data-r="${c.rId}" data-t="${c.tId}" onclick="ouvrir(this)">
      <div class="conv-avatar">${c.photo?`<img src="${c.photo}">`:(ini)}</div>
      <div class="conv-info">
        <div class="conv-top"><div class="conv-name">${c.nom}</div><div class="conv-time">${t}</div></div>
        <div class="conv-preview">${c.last.objet?c.last.objet+' — ':''}${c.last.contenu}</div>
      </div>
      ${c.unread?'<div class="conv-dot"></div>':''}
    </div>`;
  }).join('');
}

async function ouvrir(el) {
  const rId = el.dataset.r;
  const tId = el.dataset.t;
  const k = el.dataset.k;
  convActive = k;

  const c = convs.find(x => x.k === k);
  document.getElementById('hNom').textContent = c?.nom || (role==='talent'?'Recruteur':'Talent');
  document.getElementById('hSub').textContent = role==='talent'?'Recruteur':'Talent ShowOne';
  const hAv = document.getElementById('hAv');
  hAv.innerHTML = c?.photo ? `<img src="${c.photo}" style="width:44px;height:44px;object-fit:cover;">` : (c?.nom?.[0]||'?').toUpperCase();

  document.querySelectorAll('.conv-item').forEach(x => x.classList.toggle('active', x.dataset.k===k));

  // Charger les messages du thread
  const thread = await get(`/rest/v1/messages?recruteur_id=eq.${rId}&talent_id=eq.${tId}&order=created_at.asc&select=*`);

  // Marquer comme lus
  if (role==='talent' && thread.some(m=>!m.lu)) {
    await fetch(`${SB}/rest/v1/messages?recruteur_id=eq.${rId}&talent_id=eq.${tId}&lu=eq.false`, {
      method:'PATCH', headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+token,Prefer:'return=minimal'},
      body:JSON.stringify({lu:true})
    });
    if (c) c.unread = 0;
    afficher(convs);
  }

  // Afficher
  const area = document.getElementById('msgArea');
  area.innerHTML = '';
  let lastDate = null;
  thread.forEach(m => {
    const d = new Date(m.created_at);
    const ds = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    if (ds !== lastDate) { area.innerHTML += `<div class="msg-date">${ds}</div>`; lastDate = ds; }
    const isSent = (m.objet||'').startsWith('RE:') ? role==='talent' : role==='recruteur';
    const t = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    area.innerHTML += `<div class="msg-wrap ${isSent?'sent':''}">
      <div class="msg-av">${isSent?'Moi':'R'[0]}</div>
      <div class="msg-bubble ${isSent?'sent':'recv'}">
        ${m.objet&&!m.objet.startsWith('RE:')?`<div class="msg-objet">📌 ${m.objet}</div>`:''}
        ${m.contenu}
        <div class="msg-time">${t}</div>
      </div>
    </div>`;
  });
  area.scrollTop = area.scrollHeight;

  // Stocker pour réponse
  document.getElementById('replyTa').dataset.rId = rId;
  document.getElementById('replyTa').dataset.tId = tId;
  document.getElementById('replyTa').dataset.objet = c?.last?.objet || '';

  document.getElementById('placeholder').style.display = 'none';
  const ca = document.getElementById('convActive');
  ca.style.display = 'flex';
}

async function envoyer() {
  const ta = document.getElementById('replyTa');
  const contenu = ta.value.trim();
  if (!contenu) return;
  const rId = ta.dataset.rId;
  const tId = ta.dataset.tId;
  const objet = 'RE: ' + (ta.dataset.objet || 'Message');
  document.getElementById('btnReply').disabled = true;
  await post('/rest/v1/messages', { recruteur_id: rId, talent_id: tId, objet, contenu, lu: false });
  ta.value = ''; ta.style.height = 'auto';
  document.getElementById('btnReply').disabled = false;
  // Rafraîchir
  const el = document.querySelector(`.conv-item[data-r="${rId}"][data-t="${tId}"]`);
  if (el) await ouvrir(el);
  await charger();
}

function filtrer(q) {
  if (!q) { afficher(convs); return; }
  afficher(convs.filter(c => c.nom.toLowerCase().includes(q.toLowerCase()) || (c.last.objet||'').toLowerCase().includes(q.toLowerCase())));
}

async function ouvrirModal(preId) {
  document.getElementById('modalOv').classList.add('open');
  const d = await get('/rest/v1/profils_talents?select=id,nom_scene&order=nom_scene.asc');
  const sel = document.getElementById('selTalent');
  sel.innerHTML = '<option value="">Choisir un talent…</option>' + d.map(t => `<option value="${t.id}" ${t.id===preId?'selected':''}>${t.nom_scene||t.id}</option>`).join('');
}

function fermerModal() { document.getElementById('modalOv').classList.remove('open'); }

async function envoyerNouveauMsg() {
  const tId = document.getElementById('selTalent').value;
  const objet = document.getElementById('newObjet').value.trim() || 'Message';
  const contenu = document.getElementById('newContenu').value.trim();
  if (!tId || !contenu) { alert('Remplissez tous les champs.'); return; }
  await post('/rest/v1/messages', { recruteur_id: profilId, talent_id: tId, objet, contenu, lu: false });
  fermerModal();
  document.getElementById('newObjet').value = '';
  document.getElementById('newContenu').value = '';
  await charger();
  const el = document.querySelector(`.conv-item[data-r="${profilId}"][data-t="${tId}"]`);
  if (el) setTimeout(() => ouvrir(el), 300);
}

function deconnecter() {
  localStorage.removeItem('showone_token');
  localStorage.removeItem('showone_user');
  location.href = '/connexion';
}

init();
</script>
</body>
