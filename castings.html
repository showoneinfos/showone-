<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castings — ShowOne | Toutes les offres de casting en France</title>
  <meta name="description" content="Retrouvez toutes les offres de casting disponibles sur ShowOne : films, publicités, clips, mode, événements. Postulez en quelques clics.">
  <meta name="keywords" content="castings france, offres casting, casting film, casting pub, casting mode, showone">
  <meta name="robots" content="index, follow">
  <meta name="author" content="ShowOne">
  <link rel="canonical" href="https://www.showone.fr/castings">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ShowOne">
  <meta property="og:title" content="Offres de casting — ShowOne">
  <meta property="og:description" content="Films, publicités, clips, mode… Découvrez et postulez aux castings disponibles sur ShowOne.">
  <meta property="og:image" content="https://www.showone.fr/og-image.jpg">
  <meta property="og:url" content="https://www.showone.fr/castings">
  <meta property="og:locale" content="fr_FR">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Offres de casting — ShowOne">
  <meta name="twitter:description" content="Films, publicités, clips, mode… Découvrez et postulez aux castings disponibles sur ShowOne.">
  <meta name="twitter:image" content="https://www.showone.fr/og-image.jpg">

<title>ShowOne — Castings disponibles</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --purple:#5B4FE8; --purple-dark:#3D32C4; --purple-deep:#1a1535; --purple-mid:#2d2560; --red:#E8394F; --cream:#f5f3ff; --muted:#a09dc0; --border:rgba(91,79,232,0.13); --white:#fff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--purple-deep); }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; background:rgba(26,21,53,0.92); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.06); }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:#fff; text-decoration:none; }
  .nav-logo span { color:var(--red); }
  .nav-right { display:flex; gap:12px; align-items:center; }
  .btn-nav { padding:8px 18px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; text-decoration:none; display:inline-block; }
  .btn-outline { border:1px solid rgba(255,255,255,0.25); color:#fff; background:transparent; }
  .btn-fill { border:none; background:var(--red); color:#fff; }

  .hero { background:linear-gradient(135deg,var(--purple-deep) 0%,var(--purple-mid) 60%,#3a1a2e 100%); padding:110px 64px 60px; }
  .hero-tag { display:inline-flex; align-items:center; gap:7px; padding:5px 16px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); font-size:12px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; margin-bottom:20px; }
  .hero h1 { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:#fff; letter-spacing:-1px; margin-bottom:10px; }
  .hero h1 em { color:var(--red); font-style:normal; }
  .hero-sub { color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:28px; }
  .hero-search { display:flex; gap:10px; max-width:600px; }
  .hero-search input { flex:1; padding:12px 18px; border-radius:10px; border:none; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; }
  .hero-search button { padding:12px 24px; border-radius:10px; border:none; background:var(--red); color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; }

  .content { max-width:1100px; margin:0 auto; padding:40px 40px 80px; }

  .filters { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
  .filter-btn { padding:8px 18px; border-radius:999px; border:1.5px solid var(--border); background:var(--white); font-size:13px; font-weight:600; color:var(--purple-deep); cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; }
  .filter-btn.active, .filter-btn:hover { background:var(--purple); color:#fff; border-color:var(--purple); }

  .castings-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }

  .casting-card { background:var(--white); border:1.5px solid var(--border); border-radius:18px; padding:24px; transition:all .3s; }
  .casting-card:hover { box-shadow:0 16px 32px rgba(91,79,232,0.1); transform:translateY(-2px); }
  .casting-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; gap:12px; }
  .casting-badge { padding:4px 12px; border-radius:999px; background:rgba(91,79,232,0.1); color:var(--purple); font-size:11px; font-weight:700; white-space:nowrap; }
  .casting-statut { padding:4px 12px; border-radius:999px; background:rgba(16,185,129,0.1); color:#065f46; font-size:11px; font-weight:700; }
  .casting-titre { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:10px; line-height:1.3; }
  .casting-desc { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:16px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .casting-infos { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
  .casting-info { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--purple-deep); font-weight:600; }
  .casting-footer { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border); }
  .casting-recruteur { font-size:12px; color:var(--muted); }
  .btn-postuler { padding:9px 20px; border-radius:8px; border:none; background:var(--purple); color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; }
  .btn-postuler:hover { background:var(--purple-dark); }
  .btn-postuler.postule { background:rgba(16,185,129,0.1); color:#065f46; cursor:default; }

  .empty-state { text-align:center; padding:80px 20px; grid-column:1/-1; }
  .empty-ico { font-size:64px; margin-bottom:16px; }
  .empty-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
  .empty-sub { color:var(--muted); font-size:15px; }

  /* MODAL POSTULER */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--white); border-radius:20px; padding:28px; max-width:500px; width:100%; }
  .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-head h2 { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
  .modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); }
  .modal-casting-info { background:var(--cream); border-radius:10px; padding:14px; margin-bottom:18px; font-size:13px; }
  .modal-casting-info strong { font-weight:700; display:block; margin-bottom:4px; }
  .fg { margin-bottom:16px; }
  .flabel { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  .ftextarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; resize:vertical; min-height:100px; }
  .ftextarea:focus { border-color:var(--purple); }
  .modal-actions { display:flex; gap:10px; }
  .btn-cancel { flex:1; padding:12px; border-radius:10px; border:1.5px solid var(--border); background:transparent; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-send { flex:2; padding:12px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

  @media (max-width: 768px) {
    nav { padding:14px 20px; }
    .btn-outline { display:none; }
    .hero { padding:80px 20px 40px; }
    .hero h1 { font-size:26px; }
    .hero-search { flex-direction:column; }
    .content { padding:24px 16px 60px; }
    .castings-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Show<span>One</span></a>
  <div class="nav-right">
    <a href="/connexion" class="btn-nav btn-outline">Connexion</a>
    <a href="/inscription-talent" class="btn-nav btn-fill">Rejoindre</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">🎬 Opportunités</div>
  <h1>Castings <em>disponibles</em></h1>
  <p class="hero-sub">Des recruteurs professionnels cherchent des talents comme vous. Postulez directement depuis ShowOne !</p>
  <div class="hero-search">
    <input id="searchInput" type="text" placeholder="Rechercher un casting, une catégorie, une ville…" oninput="filtrerCastings()">
    <button onclick="filtrerCastings()">🔍 Chercher</button>
  </div>
</div>

<div class="content">
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filtrerCat('Tous', this)">Tous</button>
    <button class="filter-btn" onclick="filtrerCat('Acting / Cinéma & TV', this)">🎬 Acting</button>
    <button class="filter-btn" onclick="filtrerCat('Musique / Chant', this)">🎤 Musique</button>
    <button class="filter-btn" onclick="filtrerCat('Danse', this)">💃 Danse</button>
    <button class="filter-btn" onclick="filtrerCat('Sport', this)">⚽ Sport</button>
    <button class="filter-btn" onclick="filtrerCat('Mode / Mannequinat', this)">👗 Mode</button>
    <button class="filter-btn" onclick="filtrerCat('Art & Création', this)">🎨 Art</button>
    <button class="filter-btn" onclick="filtrerCat('Créateurs de contenu', this)">📱 Créateurs</button>
  </div>

  <div class="castings-grid" id="castingsGrid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Chargement des castings…</div>
  </div>
</div>

<!-- MODAL POSTULER -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Postuler à ce casting</h2>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>
    <div class="modal-casting-info" id="modalCastingInfo"></div>
    <div class="fg">
      <label class="flabel">Votre message de candidature</label>
      <textarea id="msgCandidature" class="ftextarea" placeholder="Présentez-vous brièvement et expliquez pourquoi vous correspondez à ce casting…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
      <button class="btn-send" onclick="envoyerCandidature()">Envoyer ma candidature ✓</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';

let tousCastings = [];
let catActive = 'Tous';
let castingSelectionne = null;

async function chargerCastings() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/castings?statut=eq.actif&select=*,profils_recruteurs(nom_societe,type_recruteur)&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    tousCastings = await res.json();
    afficherCastings(tousCastings);
  } catch(err) {
    console.error(err);
    afficherVide();
  }
}

function filtrerCat(cat, btn) {
  catActive = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtrerCastings();
}

function filtrerCastings() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtres = tousCastings;

  if (catActive !== 'Tous') {
    filtres = filtres.filter(c => c.categorie?.toLowerCase().includes(catActive.toLowerCase()));
  }

  if (search) {
    filtres = filtres.filter(c =>
      c.titre?.toLowerCase().includes(search) ||
      c.description?.toLowerCase().includes(search) ||
      c.ville?.toLowerCase().includes(search) ||
      c.categorie?.toLowerCase().includes(search)
    );
  }

  afficherCastings(filtres);
}

function afficherCastings(castings) {
  const grid = document.getElementById('castingsGrid');
  if (!castings || castings.length === 0) { afficherVide(); return; }

  grid.innerHTML = castings.map(c => {
    const recruteur = c.profils_recruteurs;
    const date = c.date_casting ? new Date(c.date_casting).toLocaleDateString('fr-FR') : null;
    const remun = c.remuneration || '';

    return `
      <div class="casting-card">
        <div class="casting-head">
          <span class="casting-badge">${c.categorie || 'Général'}</span>
          <span class="casting-statut">✅ Actif</span>
        </div>
        <div class="casting-titre">${c.titre}</div>
        <div class="casting-desc">${c.description || ''}</div>
        <div class="casting-infos">
          <div class="casting-info">📍 ${c.ville || 'Non précisé'}</div>
          ${date ? `<div class="casting-info">📅 ${date}</div>` : ''}
          ${remun ? `<div class="casting-info">💰 ${remun}</div>` : ''}
        </div>
        <div class="casting-footer">
          <div class="casting-recruteur">Par <strong>${recruteur?.nom_societe || 'Recruteur ShowOne'}</strong></div>
          <button class="btn-postuler" onclick="ouvrirModal('${c.id}', '${c.titre.replace(/'/g,"\\'")}', '${c.categorie || ''}', '${c.ville || ''}')">Postuler →</button>
        </div>
      </div>`;
  }).join('');
}

function afficherVide() {
  document.getElementById('castingsGrid').innerHTML = `
    <div class="empty-state">
      <div class="empty-ico">🎬</div>
      <div class="empty-title">Aucun casting disponible</div>
      <p class="empty-sub">Les castings apparaîtront ici dès que des recruteurs en publieront.<br>Inscrivez-vous pour être notifié !</p>
    </div>`;
}

function ouvrirModal(castingId, titre, categorie, ville) {
  castingSelectionne = castingId;
  document.getElementById('modalCastingInfo').innerHTML = `
    <strong>${titre}</strong>
    <span>${categorie} ${ville ? '· ' + ville : ''}</span>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function fermerModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  castingSelectionne = null;
}

async function envoyerCandidature() {
  const token = window.localStorage.getItem('showone_token');
  const userStr = window.localStorage.getItem('showone_user');
  if (!token || !userStr) {
    window.location.href = '/connexion';
    return;
  }

  const message = document.getElementById('msgCandidature').value.trim();
  if (!message) { alert('Veuillez écrire un message de candidature !'); return; }

  const btn = document.querySelector('.btn-send');
  btn.textContent = 'Envoi en cours…';
  btn.disabled = true;

  try {
    const userObj = JSON.parse(userStr);
    const userEmail = userObj.email || userObj.user?.email;

    // Récupérer le profil talent
    const userRes = await fetch(`${SUPABASE_URL}/rest/v1/utilisateurs?email=eq.${encodeURIComponent(userEmail)}&select=id`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    const userData = await userRes.json();
    const dbUserId = userData[0]?.id;

    const profRes = await fetch(`${SUPABASE_URL}/rest/v1/profils_talents?utilisateur_id=eq.${dbUserId}&select=id`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    const profData = await profRes.json();
    const talentId = profData[0]?.id;

    if (!talentId) {
      alert('Vous devez être inscrit comme talent pour postuler !');
      window.location.href = '/inscription-talent';
      return;
    }

    // Envoyer la candidature
    await fetch(`${SUPABASE_URL}/rest/v1/candidatures`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${token}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        casting_id: castingSelectionne,
        talent_id: talentId,
        message,
        statut: 'en_attente'
      })
    });

    fermerModal();

    // Notification succès
    const notif = document.createElement('div');
    notif.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:16px 24px;border-radius:14px;font-weight:700;font-size:14px;z-index:9999;font-family:DM Sans,sans-serif;box-shadow:0 8px 24px rgba(16,185,129,0.3);';
    notif.textContent = '✅ Candidature envoyée avec succès !';
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 4000);

  } catch(err) {
    console.error(err);
    if (err.message?.includes('duplicate')) {
      alert('Vous avez déjà postulé à ce casting !');
    } else {
      alert('Erreur lors de l\'envoi. Veuillez réessayer.');
    }
    btn.textContent = 'Envoyer ma candidature ✓';
    btn.disabled = false;
  }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});

chargerCastings();
</script>
</body>
</html>
