<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --purple:#5B4FE8; --purple-dark:#3D32C4; --purple-deep:#1a1535; --purple-mid:#2d2560; --red:#E8394F; --cream:#f5f3ff; --muted:#a09dc0; --border:rgba(91,79,232,0.13); --white:#fff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--purple-deep); }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; background:rgba(26,21,53,0.92); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.06); }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:#fff; text-decoration:none; }
  .nav-logo span { color:var(--red); }
  .nav-right { display:flex; gap:12px; align-items:center; }
  .btn-nav { padding:8px 18px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; text-decoration:none; display:inline-block; }
  .btn-outline { border:1px solid rgba(255,255,255,0.25); color:#fff; background:transparent; }
  .btn-fill { border:none; background:var(--red); color:#fff; }

  .hero { background:linear-gradient(135deg,var(--purple-deep) 0%,var(--purple-mid) 60%,#3a1a2e 100%); padding:100px 64px 50px; }
  .hero-back { color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:16px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
  .hero-back:hover { color:#fff; }
  .hero-ico { font-size:48px; margin-bottom:12px; }
  .hero h1 { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:#fff; letter-spacing:-1px; margin-bottom:8px; }
  .hero h1 em { color:var(--red); font-style:normal; }
  .hero-sub { color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:24px; }
  .hero-stats { display:flex; gap:24px; flex-wrap:wrap; }
  .hero-stat { color:rgba(255,255,255,0.7); font-size:13px; }
  .hero-stat strong { color:#fff; font-weight:700; }

  /* SOUS-CATÉGORIES */
  .sous-cats-bar { background:var(--white); border-bottom:1px solid var(--border); padding:16px 64px; display:flex; gap:10px; overflow-x:auto; position:sticky; top:64px; z-index:50; }
  .sous-cat-btn { padding:7px 16px; border-radius:999px; border:1.5px solid var(--border); background:transparent; font-size:13px; font-weight:600; color:var(--purple-deep); cursor:pointer; transition:all .2s; white-space:nowrap; font-family:'DM Sans',sans-serif; }
  .sous-cat-btn.active, .sous-cat-btn:hover { background:var(--purple); color:#fff; border-color:var(--purple); }

  /* CONTENU */
  .content { max-width:1200px; margin:0 auto; padding:40px 40px 80px; }

  .videos-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; }

  .video-card { background:var(--white); border-radius:16px; overflow:hidden; border:1.5px solid var(--border); transition:all .3s; cursor:pointer; }
  .video-card:hover { box-shadow:0 16px 32px rgba(91,79,232,0.12); transform:translateY(-3px); }
  .video-thumb { aspect-ratio:9/16; position:relative; overflow:hidden; background:linear-gradient(135deg,var(--purple-deep),var(--purple-mid)); }
  .video-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .video-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); }
  .video-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; background:rgba(255,255,255,0.2); backdrop-filter:blur(8px); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; opacity:0; transition:opacity .2s; }
  .video-card:hover .video-play { opacity:1; }
  .video-badge { position:absolute; top:10px; left:10px; padding:3px 10px; border-radius:999px; background:var(--purple); color:#fff; font-size:10px; font-weight:700; }
  .video-like { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.4); border:none; color:#fff; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .video-info { padding:12px; }
  .video-talent-name { font-weight:700; font-size:14px; margin-bottom:4px; }
  .video-titre { font-size:12px; color:var(--muted); margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .video-meta { display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--muted); }
  .video-vues { font-weight:600; color:var(--purple-deep); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:80px 20px; }
  .empty-ico { font-size:64px; margin-bottom:16px; }
  .empty-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
  .empty-sub { color:var(--muted); font-size:15px; margin-bottom:24px; }
  .btn-cta { padding:13px 28px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; text-decoration:none; display:inline-block; }

  /* POPUP VIDÉO */
  .popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; flex-direction:column; padding:20px; }
  .popup.open { display:flex; }
  .popup-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:22px; cursor:pointer; width:44px; height:44px; border-radius:50%; }
  .popup-video { width:100%; max-width:480px; }
  .popup-video video { width:100%; border-radius:12px; background:#000; max-height:70vh; }
  .popup-info { color:#fff; margin-top:16px; text-align:center; }
  .popup-info h3 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:4px; }
  .popup-info p { color:rgba(255,255,255,0.5); font-size:13px; }
  .popup-actions { display:flex; gap:12px; margin-top:16px; }
  .btn-popup { padding:10px 20px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; border:none; }
  .btn-like-popup { background:rgba(255,255,255,0.1); color:#fff; }
  .btn-contact-popup { background:var(--red); color:#fff; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding:14px 20px; }
    .btn-outline { display:none; }
    .hero { padding:80px 20px 36px; }
    .hero h1 { font-size:26px; }
    .sous-cats-bar { padding:12px 16px; top:56px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .content { padding:24px 16px 60px; }
    .videos-grid { grid-template-columns:repeat(2, 1fr); gap:10px; }
    .video-info { padding:10px; }
    .video-talent-name { font-size:13px; }
    .video-titre { font-size:11px; }
    .video-meta { flex-direction:column; align-items:flex-start; gap:2px; }
    .video-vues { font-size:11px; }

    /* Popup mobile — plein écran vertical */
    .popup { padding:0; align-items:flex-end; }
    .popup-close { top:12px; right:12px; }
    .popup-video { max-width:100%; border-radius:20px 20px 0 0; background:#111; padding:16px 16px 0; }
    .popup-video video { border-radius:10px; max-height:50vh; }
    .popup-info { padding:0 16px; margin-top:12px; text-align:left; }
    .popup-info h3 { font-size:16px; }
    .popup-info p { font-size:12px; }
    .popup-actions { padding:12px 16px 32px; flex-direction:column; gap:8px; }
    .btn-popup { width:100%; padding:14px; font-size:14px; text-align:center; border-radius:10px; }
    .btn-contact-popup { background:var(--red); }
  }

  .lang-selector { display:flex; align-items:center; gap:4px; margin-left:8px; }
  .lang-btn { padding:4px 8px; border-radius:6px; border:1.5px solid rgba(255,255,255,0.2); background:transparent; color:rgba(255,255,255,0.6); font-size:11px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; letter-spacing:.3px; }
  .lang-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
  .lang-btn.active { background:rgba(255,255,255,0.15); color:#fff; border-color:rgba(255,255,255,0.4); }
  .lang-selector.light .lang-btn { border-color:var(--border); color:var(--muted); }
  .lang-selector.light .lang-btn:hover { border-color:var(--purple); color:var(--purple); }
  .lang-selector.light .lang-btn.active { background:var(--purple); color:#fff; border-color:var(--purple); }

</style>

<script src="/translations.js"></script>
</head>
<body>

  <div class="nav-right">
    <a href="/connexion" class="btn-nav btn-outline">Connexion</a>
    <a href="/inscription-talent" class="btn-nav btn-fill">Rejoindre</a>
  </div>
</nav>

<div class="hero" id="hero">
  <a href="/categories" class="hero-back">← Toutes les catégories</a>
  <div class="hero-ico" id="heroIco">🎭</div>
  <h1 id="heroTitre">Chargement…</h1>
  <p class="hero-sub" id="heroSub"></p>
  <div class="hero-stats">
    <div class="hero-stat"><strong id="nbTalents">0</strong> talents</div>
    <div class="hero-stat"><strong id="nbVideos">0</strong> vidéos</div>
  </div>
</div>

<div class="sous-cats-bar" id="sousCatsBar"></div>

<div class="content">
  <div class="videos-grid" id="videosGrid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Chargement…</div>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <button class="popup-close" onclick="fermerPopup()">✕</button>
  <div class="popup-video">
    <video id="popupPlayer" controls playsinline></video>
  </div>
  <div class="popup-info">
    <h3 id="popupNom"></h3>
    <p id="popupCat"></p>
    <p id="popupVues"></p>
  </div>
  <div class="popup-actions">
    <button class="btn-popup btn-like-popup" onclick="likerPopup(this)">🤍 J'aime</button>
    <button class="btn-popup btn-contact-popup" id="btnContacter" onclick="contacterTalent()">✉️ Contacter ce talent</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';

const CATEGORIES = {
  'acting': { titre: 'Acting / Cinéma & TV', ico: '🎬', keys: ['acting','cinéma','cinema','tv','acteur','figuration','doublage','improvisation','théâtre','theatre'], sous: ['Acteur cinéma','Acteur série TV','Acteur publicité','Figuration','Voix off / Doublage','Improvisation','Acteur théâtre'] },
  'musique': { titre: 'Musique / Chant', ico: '🎤', keys: ['musique','chant','chanteur','groupe','rap','hip-hop','pop','rock','dj','compositeur','beatmaker','musicien'], sous: ['Chanteur solo','Groupe / Band','Rap / Hip-hop','Pop','Rock','DJ','Compositeur / Beatmaker','Musicien'] },
  'danse': { titre: 'Danse', ico: '💃', keys: ['danse','danseur','hip-hop','contemporaine','classique','latino','chorégraphe','choregraphe'], sous: ['Danse urbaine (hip-hop)','Danse contemporaine','Danse classique','Danse latino','Chorégraphe'] },
  'sport': { titre: 'Sport', ico: '⚽', keys: ['sport','football','basketball','tennis','combat','fitness','coaching','freestyle','extrême','extreme'], sous: ['Football','Basketball','Tennis','Sports de combat','Fitness / Coaching','Freestyle','Sports extrêmes'] },
  'createurs': { titre: 'Créateurs de contenu', ico: '📱', keys: ['créateur','createur','youtube','youtubeur','tiktok','tiktoker','streamer','lifestyle','humour','gaming'], sous: ['YouTuber','TikToker','Streamer','Créateur lifestyle','Créateur humour','Gaming'] },
  'mode': { titre: 'Mode / Mannequinat', ico: '👗', keys: ['mode','mannequin','mannequinat','curvy','défilé','defile','modèle','modele','fitness','pub'], sous: ['Curvy femme','Curvy homme','Mannequin enfant','Mannequin défilé','Modèle fitness','Modèle pub'] },
  'art': { titre: 'Art & Création', ico: '🎨', keys: ['art','création','creation','dessin','illustration','peinture','sculpture','photographie','vidéaste','videaste','monteur'], sous: ['Dessin / Illustration','Peinture','Sculpture','Photographie','Vidéaste / Monteur'] },
  'talents': { titre: 'Performances & Talents uniques', ico: '✨', keys: ['talent','performance','magicien','humoriste','stand-up','imitateur','acrobate','cascadeur'], sous: ['Magicien','Humoriste / Stand-up','Imitateur','Acrobate','Cascadeur'] },
  'animaux': { titre: 'Animaux', ico: '🐾', keys: ['animal','animaux','chat','chien','dresseur'], sous: ['Chat','Chien','Dresseur','Autre animal'] },
  'pro': { titre: 'Compétences professionnelles', ico: '🎙️', keys: ['compétence','competence','présentateur','presentateur','animateur','conférencier','conferencier','coach','formateur'], sous: ['Présentateur / Animateur','Conférencier','Coach','Formateur'] }
};

// Récupérer la catégorie depuis l'URL — supporte /categorie-detail?cat=mode
const params = new URLSearchParams(window.location.search);
const pathParts = window.location.pathname.split('/');
const catKey = params.get('cat') || pathParts[pathParts.length - 1] || 'musique';
const cat = CATEGORIES[catKey] || CATEGORIES['musique'];

let sousCatActive = 'Tous';
let toutesVideos = [];

// Lire la sous-catégorie depuis l'URL si présente
const scParam = params.get('sc');
if (scParam) sousCatActive = decodeURIComponent(scParam.replace(/\+/g, ' '));

// Initialiser la page
document.title = `ShowOne — ${cat.titre}`;
document.getElementById('heroIco').textContent = cat.ico;
document.getElementById('heroTitre').innerHTML = cat.titre + ' <em>Talents</em>';
document.getElementById('heroSub').textContent = `Découvrez les meilleurs talents ShowOne dans la catégorie ${cat.titre}`;

// Sous-catégories
const sousCatsBar = document.getElementById('sousCatsBar');
sousCatsBar.innerHTML = `<button class="sous-cat-btn active" onclick="filtrerSousCat('Tous', this)">Tous</button>` +
  cat.sous.map(s => `<button class="sous-cat-btn" onclick="filtrerSousCat('${s}', this)">${s}</button>`).join('');

async function chargerVideos() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/videos?statut=eq.en_ligne&playback_id=not.is.null&select=*,profils_talents(id,nom_scene,categorie,sous_categorie,photo_url,utilisateurs(prenom,nom,ville))&order=vues.desc&limit=50`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const videos = await res.json();

    // Filtrer par catégorie en utilisant les mots clés
    toutesVideos = (Array.isArray(videos) ? videos : []).filter(v => {
      const c = (v.profils_talents?.categorie || '').toLowerCase();
      const sc = (v.profils_talents?.sous_categorie || '').toLowerCase();
      // Vérifier si la catégorie ou sous-catégorie contient un des mots clés
      return cat.keys.some(key => c.includes(key) || sc.includes(key));
    });

    document.getElementById('nbTalents').textContent = new Set(toutesVideos.map(v => v.profils_talents?.id)).size;
    document.getElementById('nbVideos').textContent = toutesVideos.length;

    // Filtrer par sous-catégorie si présente dans l'URL
    if (sousCatActive !== 'Tous') {
      const filtrees = toutesVideos.filter(v => {
        const sc = (v.profils_talents?.sous_categorie || '').toLowerCase();
        const c = (v.profils_talents?.categorie || '').toLowerCase();
        return sc.includes(sousCatActive.toLowerCase()) || c.includes(sousCatActive.toLowerCase());
      });
      afficherVideos(filtrees);
      // Activer le bon bouton
      document.querySelectorAll('.sous-cat-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim() === sousCatActive);
      });
    } else {
      afficherVideos(toutesVideos);
    }
  } catch(err) {
    console.error(err);
    afficherVide();
  }
}

function filtrerSousCat(sousCat, btn) {
  sousCatActive = sousCat;
  document.querySelectorAll('.sous-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (sousCat === 'Tous') {
    afficherVideos(toutesVideos);
  } else {
    const filtrees = toutesVideos.filter(v => {
      const sc = v.profils_talents?.sous_categorie?.toLowerCase() || '';
      return sc.includes(sousCat.toLowerCase());
    });
    afficherVideos(filtrees);
  }
}

function afficherVideos(videos) {
  const grid = document.getElementById('videosGrid');
  if (!videos || videos.length === 0) { afficherVide(); return; }

  grid.innerHTML = videos.map(v => {
    const p = v.profils_talents;
    const u = p?.utilisateurs;
    const nom = p?.nom_scene || ((u?.prenom || '') + ' ' + (u?.nom || ''));
    const sousCat = p?.sous_categorie || p?.categorie || '';
    const ville = u?.ville || '';
    const vues = v.vues || 0;

    const thumb = v.playback_id
      ? `<img src="https://image.mux.com/${v.playback_id}/thumbnail.jpg?width=300&height=500&fit_mode=crop" alt="${nom}" loading="lazy">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;">${cat.ico}</div>`;

    return `
      <div class="video-card" onclick="ouvrirVideo('${v.playback_id}','${nom}','${sousCat}','${ville}',${vues},'${p?.id||''}')">
        <div class="video-thumb">
          ${thumb}
          <div class="video-overlay"></div>
          <div class="video-play">▶</div>
          <div class="video-badge">${sousCat || cat.ico}</div>
          <button class="video-like" onclick="event.stopPropagation();this.textContent=this.textContent==='🤍'?'❤️':'🤍'">🤍</button>
        </div>
        <div class="video-info">
          <div class="video-talent-name">${nom}</div>
          <div class="video-titre">${v.titre || 'Ma vidéo'}</div>
          <div class="video-meta">
            <span class="video-vues">👁 ${vues.toLocaleString('fr-FR')}</span>
            <span>${ville}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function afficherVide() {
  document.getElementById('videosGrid').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-ico">${cat.ico}</div>
      <div class="empty-title">Soyez le premier !</div>
      <p class="empty-sub">Aucun talent dans cette catégorie pour l'instant.<br>Inscrivez-vous et montrez votre talent !</p>
      <a href="/inscription-talent" class="btn-cta">🌟 S'inscrire gratuitement</a>
    </div>`;
}

let _currentProfilId = null;

function ouvrirVideo(playbackId, nom, cat, ville, vues, profilId) {
  if (!playbackId) return;
  _currentProfilId = profilId || null;
  document.getElementById('popupNom').textContent = nom;
  document.getElementById('popupCat').textContent = cat + (ville ? ' · ' + ville : '');
  document.getElementById('popupVues').textContent = '👁 ' + Number(vues).toLocaleString('fr-FR') + ' vues';
  document.getElementById('popup').classList.add('open');

  const video = document.getElementById('popupPlayer');
  const src = 'https://stream.mux.com/' + playbackId + '.m3u8';

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.play();
  } else {
    if (!window.Hls) {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
      script.onload = () => lancerHls(video, src);
      document.head.appendChild(script);
    } else {
      lancerHls(video, src);
    }
  }

  // Incrémenter les vues
  incrementerVues(playbackId);
}

function lancerHls(video, src) {
  if (window.Hls && window.Hls.isSupported()) {
    const hls = new window.Hls();
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(window.Hls.Events.MANIFEST_PARSED, () => video.play());
  }
}

function fermerPopup() {
  document.getElementById('popup').classList.remove('open');
  const video = document.getElementById('popupPlayer');
  if (video) video.pause();
}

function likerPopup(btn) {
  btn.textContent = btn.textContent.includes('🤍') ? '❤️ J\'aime' : '🤍 J\'aime';
}

async function incrementerVues(playbackId) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/videos?playback_id=eq.${playbackId}&select=id,vues`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    if (data && data[0]) {
      await fetch(`${SUPABASE_URL}/rest/v1/videos?id=eq.${data[0].id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ vues: (data[0].vues || 0) + 1 })
      });
    }
  } catch(e) {}
}

document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) fermerPopup();
});

function contacterTalent() {
  const token = localStorage.getItem('showone_token');
  const userStr = localStorage.getItem('showone_user');

  // Pas connecté → inscription recruteur
  if (!token || !userStr) {
    window.location.href = '/inscription-recruteur';
    return;
  }

  let user;
  try { user = JSON.parse(userStr); } catch(e) { window.location.href = '/inscription-recruteur'; return; }

  // Connecté en tant que talent → message
  if (user.type_compte === 'talent') {
    alert('Vous êtes connecté en tant que talent. Pour contacter des talents, créez un compte recruteur.');
    return;
  }

  // Connecté en recruteur → aller vers la messagerie avec ce talent
  if (_currentProfilId) {
    window.location.href = `/dashboard-recruteur?action=message&talent_id=${_currentProfilId}`;
  } else {
    window.location.href = '/dashboard-recruteur';
  }
}

chargerVideos();
