<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShowOne — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --purple:#5B4FE8; --purple-dark:#3D32C4; --purple-deep:#1a1535; --red:#E8394F; --cream:#f5f3ff; --muted:#a09dc0; --border:rgba(91,79,232,0.18); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--purple-deep); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; border:1.5px solid var(--border); border-radius:20px; padding:48px 44px; width:100%; max-width:440px; text-align:center; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:24px; color:var(--purple-deep); text-decoration:none; display:inline-block; margin-bottom:32px; }
  .logo span { color:var(--red); }
  .icon-wrap { width:70px; height:70px; border-radius:50%; background:rgba(91,79,232,0.08); border:2px solid rgba(91,79,232,0.15); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px; }
  h1 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
  .subtitle { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:32px; }
  .fg { margin-bottom:16px; text-align:left; }
  .flabel { display:block; font-size:12px; font-weight:700; margin-bottom:6px; }
  .finput { width:100%; padding:12px 15px; border:1.5px solid var(--border); border-radius:10px; background:#fff; font-size:14px; color:var(--purple-deep); font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s, box-shadow .2s; }
  .finput:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(91,79,232,.09); }
  .finput::placeholder { color:var(--muted); }
  .btn-main { width:100%; padding:14px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; margin-bottom:16px; }
  .btn-main:hover { background:var(--purple-dark); transform:translateY(-1px); }
  .back-link { font-size:13px; color:var(--muted); }
  .back-link a { color:var(--purple); font-weight:600; text-decoration:none; }
  .back-link a:hover { text-decoration:underline; }

  /* ÉTAPE 2 — confirmation */
  .success-panel { display:none; }
  .success-panel.active { display:block; }
  .main-panel.hidden { display:none; }
  .success-icon { width:70px; height:70px; border-radius:50%; background:rgba(16,185,129,.1); border:2px solid #10b981; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px; }
  .success-panel h1 { margin-bottom:8px; }
  .resend { margin-top:20px; font-size:13px; color:var(--muted); }
  .resend a { color:var(--purple); font-weight:600; cursor:pointer; }
  .countdown { font-weight:700; color:var(--purple); }
</style>
</head>
<body>
<div class="card">
  <a href="showone.html" class="logo">Show<span>One</span></a>

  <!-- ÉTAPE 1 -->
  <div id="mainPanel">
    <div class="icon-wrap">🔑</div>
    <h1>Mot de passe oublié ?</h1>
    <p class="subtitle">Entrez votre adresse e-mail et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
    <div class="fg">
      <label class="flabel">Adresse e-mail</label>
      <input class="finput" type="email" id="emailInput" placeholder="votre@email.com">
    </div>
    <button class="btn-main" onclick="sendReset()">Envoyer le lien de réinitialisation</button>
    <div class="back-link">Vous vous souvenez ? <a href="connexion.html">← Retour à la connexion</a></div>
  </div>

  <!-- ÉTAPE 2 — Confirmation -->
  <div class="success-panel" id="successPanel">
    <div class="success-icon">✉️</div>
    <h1>E-mail envoyé !</h1>
    <p class="subtitle">Un lien de réinitialisation a été envoyé à <strong id="emailSent"></strong>. Vérifiez aussi vos spams.</p>
    <button class="btn-main" onclick="window.location.href='connexion.html'">← Retour à la connexion</button>
    <div class="resend">Pas reçu ? <a onclick="startCountdown()">Renvoyer</a> <span id="countdownWrap" style="display:none">dans <span class="countdown" id="countdownVal">60</span>s</span></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://emiuzigtlomlrsofxqyf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_U8P52zBkzF6Nqno_mmbcVQ_bKQLNmTP';

  async function sendReset() {
    const email = document.getElementById('emailInput').value.trim();
    const input = document.querySelector('.finput');
    if (!email || !email.includes('@')) {
      input.style.borderColor = 'var(--red)';
      return;
    }
    input.style.borderColor = '';

    const btn = document.querySelector('.btn-main');
    btn.textContent = 'Envoi en cours…';
    btn.disabled = true;

    try {
      // 1. Demander reset via Supabase Auth
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, redirect_to: 'https://www.showone.fr/connexion' })
      });

      // 2. Envoyer email stylé via Resend
      try {
        await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'reset_password',
            to: email,
            resetLink: 'https://www.showone.fr/connexion'
          })
        });
      } catch(e) { console.log('Email Resend non envoyé:', e); }

      // 3. Afficher succès
      document.getElementById('emailSent').textContent = email;
      document.getElementById('mainPanel').style.display = 'none';
      document.getElementById('successPanel').classList.add('active');

    } catch(err) {
      alert('Erreur : ' + err.message);
      btn.textContent = 'Envoyer le lien de réinitialisation';
      btn.disabled = false;
    }
  }
  function startCountdown() {
    document.getElementById('countdownWrap').style.display = 'inline';
    let n = 60;
    const interval = setInterval(() => {
      n--;
      document.getElementById('countdownVal').textContent = n;
      if (n <= 0) { clearInterval(interval); document.getElementById('countdownWrap').style.display = 'none'; }
    }, 1000);
  }
</script>
</body>
</html>
